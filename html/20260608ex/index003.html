<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IMAGE</title>
</head>
<body>
    <!-- 
        이미지 태그는 시각적 효과를 나타내고자 할때 사용합니다.
        <img> 나홀로 태그
    -->
    <h1>this is apple</h1>
    <p>사과는 맛있어! 그래서 누구나 좋아해~ 남녀노소 좋아해~</p>
    <img    src="./res/img/apple.jpg" 
            height="500" 
            alt="this image is apple." 
            title="apple"
            loading="lazy">

    <br>

    <!-- 영상 -->
    <video width="500" controls autoplay>
        <source src="./res/mov/apple.mp4" type="video/mp4">
    </video>

    <br>

    <img    src="./res/img/apple.jpg" 
            height="500" 
            alt="this image is apple." 
            title="apple"
            loading="lazy">
    
    <iframe 
            width="560" height="315" 
            src="https://www.youtube.com/embed/gdZLi9oWNZg?si=JczUIenw1cTfKTTf" 
            title="YouTube video player" 
            frameborder="0" 
            allow="accelerometer; 
            autoplay; 
            clipboard-write; 
            encrypted-media; gyroscope; 
            picture-in-picture; web-share" 
            referrerpolicy="strict-origin-when-cross-origin" 
            allowfullscreen>
    </iframe>

</body>
</html>
